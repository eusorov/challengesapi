# Manual deploy: calls the reusable docker-deploy workflow with repository secrets.
# (workflow_dispatch cannot declare secrets like workflow_call; inherit bridges them.)
name: Deploy Docker (manual)

on:
  workflow_dispatch:
    inputs:
      IMAGE_FULL_NAME:
        required: true
        type: string
        description: Full Docker image reference (e.g. ghcr.io/owner/repo:latest)
      IMAGE_SHORT_NAME:
        required: true
        type: string
        description: Short image/repo name (remote directory under ~)

jobs:
  deploy:
    uses: ./.github/workflows/docker-deploy.yml
    with:
      IMAGE_FULL_NAME: ${{ inputs.IMAGE_FULL_NAME }}
      IMAGE_SHORT_NAME: ${{ inputs.IMAGE_SHORT_NAME }}
    secrets: inherit
