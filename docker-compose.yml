services:
  app:
    build: .
    container_name: challengesapi
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-challenges}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-challenges}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-challenges}
      - JWT_SECRET=${JWT_SECRET:-change-me-use-at-least-32-bytes-for-hs256-dev-only!!}
      - MAIL_HOST=${MAIL_HOST:-host.docker.internal}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # Match application.yml default; override in .env for production (e.g. https://challenges.usomi.de)
      - FRONTEND_CORS=${FRONTEND_CORS:-http://localhost:3000}
      - VIRTUAL_HOST=challenges.api.usomi.de,challenges.api.local
      - VIRTUAL_PORT=8080
      - LETSENCRYPT_HOST=challenges.api.usomi.de

    extra_hosts:
      # SMTP tools on the host (e.g. Mailpit on 1025);
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - challenges_net
      - nginx_proxy_net

  postgres:
    image: postgis/postgis:16-3.5-alpine
    platform: linux/amd64
    container_name: challenges-postgres
    # POSTGRES_DB / USER / PASSWORD apply only on first start with an empty data volume.
    # Override POSTGRES_DB from the host: export POSTGRES_DB=mydb  (or set in a .env file beside this compose file).
    # If you change it, point Spring at the same DB name (e.g. spring.datasource.url).
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-challenges}
      POSTGRES_USER: ${POSTGRES_USER:-challenges}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-challenges}
    ports:
      - "5432:5432"
    volumes:
      - challenges-pgdata:/var/lib/postgresql/data
      # First boot only: extra DB for ./gradlew test (profile test → application-test.yml).
      - ./docker/postgres/init-challengestest.sql:/docker-entrypoint-initdb.d/02-challengestest.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-challenges} -d $${POSTGRES_DB:-challenges}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - challenges_net

# If challengestest is missing (volume created before init script was added), run once:
#   docker exec challenges-postgres psql -U challenges -d challenges -c "CREATE DATABASE challengestest;"
volumes:
  challenges-pgdata:

networks:
  challenges_net:
    driver: bridge
  nginx_proxy_net:
    external: true
