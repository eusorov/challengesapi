# Profile test: PostgreSQL database challengestest (isolated from dev DB "challenges").
# Requires: docker compose up, and DB challengestest present (init script on first volume, or see docker-compose comment).
# Fresh data each suite: `./gradlew test` runs Flyway clean on this DB first (build.gradle → prepareChallengesTestDatabase);
# application startup then runs migrate as usual (no clean in-app).
#
# Do not run demo-seed ApplicationRunner on context startup (integration tests share one DB; DemoDataLoaderIT calls DemoDataSeedService in-tx).
challenges:
  demo:
    seed:
      on-startup: false

spring:
  cache:
    type: none
  datasource:
    url: ${SPRING_DATASOURCE_TEST_URL:jdbc:postgresql://localhost:5432/challengestest}
    username: ${SPRING_DATASOURCE_TEST_USERNAME:challenges}
    password: ${SPRING_DATASOURCE_TEST_PASSWORD:challenges}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: test-jwt-secret-must-be-at-least-32-characters
  expiration-ms: 3600000
  password-reset-expiration-ms: 3600000

aws:
  s3:
    bucket: test-bucket
    region: eu-west-1
    public-base-url: https://example.com/bucket

resilience4j:
  ratelimiter:
    instances:
      apiGlobal:
        limitForPeriod: 1000000
        limitRefreshPeriod: 1m
        timeoutDuration: 5s

app:
  frontend:
    base-url: http://localhost:3000
  verification:
    signing-key: test-verification-signing-key-32chars!!
    public-base-url: https://example.com
    expire-minutes: 60
  mail:
    password-reset:
      subject: Reset Your Password
      greeting-template: "Hello {name}!"
      lines:
        - You are receiving this email because we received a password reset request for your account.
        - Click the link below to reset your password. You will be redirected to our secure reset page.
      action-label: Reset Password
      footer-lines:
        - This password reset link will expire in {minutes} minutes.
        - If you did not request a password reset, no further action is required.
      salutation: Best regards, Team
      expiry-minutes: 60
      from-address: noreply@example.com
      from-name: Team
    verification:
      subject: Verify Your Email Address
      greeting-template: "Hello Dear {name}!"
      lines:
        - Welcome! Thank you for registering with us.
        - Please click the link below to verify your email address and activate your account.
      action-label: Verify Email Address
      footer-lines:
        - This verification link will expire in {minutes} minutes.
        - If you did not create an account, no further action is required.
      salutation: Best regards, Team
      expiry-minutes: 60
      from-address: noreply@example.com
      from-name: Team
