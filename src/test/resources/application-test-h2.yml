# Activated with Spring profile "h2" together with "test" (see build.gradle: -Pdb=h2).
# In-memory H2 with PostgreSQL compatibility for Flyway migrations (BIGSERIAL, timestamptz, etc.).
spring:
  datasource:
    url: jdbc:h2:mem:challengestest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
